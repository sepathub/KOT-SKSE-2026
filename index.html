    <!-- LOGIC APPLICATION -->
    <script>
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwHt5bzkczpk5BseNCF-mkmt6i7j4Seto6fTth5uH0_S89IXzkb-PheKPx9fmRGFzSi/exec";

            { no: "015", nama: "LONTAR PELURU", kategori: "LELAKI THN 3" },
            { no: "016", nama: "LONTAR PELURU", kategori: "PEREMPUAN THN 3" },

            { no: "018", nama: "LONTAR PELURU", kategori: "PEREMPUAN THN 4" },
            { no: "019", nama: "LONTAR PELURU", kategori: "LELAKI THN 5" },
            { no: "020", nama: "LONTAR PELURU", kategori: "PEREMPUAN THN 5" },
            { no: "021", nama: "LONTAR PELURU", kategori: "LELAKI THN 6" },
            { no: "022", nama: "LONTAR PELURU", kategori: "PEREMPUAN THN 6" },
            { no: "023", nama: "100 METER", kategori: "LELAKI THN 1" },
            { no: "024", nama: "100 METER", kategori: "PEREMPUAN THN 1" },
            { no: "025", nama: "100 METER", kategori: "LELAKI THN 2" },
            { no: "026", nama: "100 METER", kategori: "PEREMPUAN THN 2" },
            { no: "027", nama: "100 METER", kategori: "LELAKI THN 3" },

            { no: "029", nama: "100 METER", kategori: "LELAKI THN 4" },
            { no: "030", nama: "100 METER", kategori: "PEREMPUAN THN 4" },
            { no: "031", nama: "100 METER", kategori: "LELAKI THN 5" },
            { no: "032", nama: "100 METER", kategori: "PEREMPUAN THN 5" },
            { no: "033", nama: "100 METER", kategori: "LELAKI THN 6" },
            { no: "034", nama: "100 METER", kategori: "PEREMPUAN THN 6" },
            { no: "035", nama: "LONTAR PELURU", kategori: "PPKI (TERBUKA)" },
            { no: "036", nama: "LOMPAT JAUH", kategori: "PPKI (TERBUKA)" },
            { no: "037", nama: "100 METER", kategori: "PPKI (TERBUKA)" },
            { no: "038", nama: "100 METER", kategori: "PRASEKOLAH" }
        ];

        function getEventsForHouse(houseName) {
            let list = [...officialEvents];
            if (houseName === "PPKI") {
                return list.filter(e => e.nama.toUpperCase() !== "LOMPAT TINGGI");
            } else if (houseName === "Pra Sekolah") {
                return list.filter(e => e.nama.toUpperCase() === "100 METER");
            }
            return list;
        }

        const houses = {
            Laksamana: { tabActive: 'bg-red-500 text-white border-b-4 border-red-700', text: 'text-red-600', border: 'border-red-400', bgLight: 'bg-red-100', bgSoft: 'bg-red-50', button: 'bg-red-500 hover:bg-red-400 border-b-4 border-red-700 active:border-b-0 active:translate-y-1 text-white', iconColor: 'text-red-500' },
            Bendahara: { tabActive: 'bg-blue-500 text-white border-b-4 border-blue-700', text: 'text-blue-600', border: 'border-blue-400', bgLight: 'bg-blue-100', bgSoft: 'bg-blue-50', button: 'bg-blue-500 hover:bg-blue-400 border-b-4 border-blue-700 active:border-b-0 active:translate-y-1 text-white', iconColor: 'text-blue-500' },
            Syahbandar: { tabActive: 'bg-yellow-400 text-yellow-900 border-b-4 border-yellow-600', text: 'text-yellow-700', border: 'border-yellow-400', bgLight: 'bg-yellow-100', bgSoft: 'bg-yellow-50', button: 'bg-yellow-400 hover:bg-yellow-300 border-b-4 border-yellow-600 active:border-b-0 active:translate-y-1 text-yellow-900 font-black', iconColor: 'text-yellow-500' },
            Temenggung: { tabActive: 'bg-green-500 text-white border-b-4 border-green-700', text: 'text-green-600', border: 'border-green-400', bgLight: 'bg-green-100', bgSoft: 'bg-green-50', button: 'bg-green-500 hover:bg-green-400 border-b-4 border-green-700 active:border-b-0 active:translate-y-1 text-white', iconColor: 'text-green-500' },
            PPKI: { tabActive: 'bg-purple-500 text-white border-b-4 border-purple-700', text: 'text-purple-600', border: 'border-purple-400', bgLight: 'bg-purple-100', bgSoft: 'bg-purple-50', button: 'bg-purple-500 hover:bg-purple-400 border-b-4 border-purple-700 active:border-b-0 active:translate-y-1 text-white', iconColor: 'text-purple-500' },
            "Pra Sekolah": { tabActive: 'bg-pink-500 text-white border-b-4 border-pink-700', text: 'text-pink-600', border: 'border-pink-400', bgLight: 'bg-pink-100', bgSoft: 'bg-pink-50', button: 'bg-pink-500 hover:bg-pink-400 border-b-4 border-pink-700 active:border-b-0 active:translate-y-1 text-white', iconColor: 'text-pink-500' }
        };

        let state = {
            participants: JSON.parse(localStorage.getItem('olahragaDataSJK')) || [],
            studentDB: JSON.parse(localStorage.getItem('olahragaStudentDB')) || {},
            activeTab: 'Utama',
            syncStatus: 'loading',
            adminConfig: JSON.parse(localStorage.getItem('olahragaAdminConfig')) || { isRegistrationLocked: false, housePasswords: { Laksamana: '', Bendahara: '', Syahbandar: '', Temenggung: '', PPKI: '', "Pra Sekolah": '' } },
            medalResults: JSON.parse(localStorage.getItem('olahragaMedalResults')) || {},
            unlockedHouses: [],
            isZonCikguUnlocked: false,
            
            // UI View States
            authModal: { isOpen: false, targetHouse: '', error: false },
            printHouse: 'Laksamana',
            showPrintModal: false,
            adminFilterAcara: 'Semua', // Tapis acara di Zon Cikgu
            houseFilterAcara: 'Semua', // Tapis acara di Tab Rumah Sukan
            searchKeyword: '' // Carian acara
        };

        function saveData() {
            localStorage.setItem('olahragaDataSJK', JSON.stringify(state.participants));
            localStorage.setItem('olahragaStudentDB', JSON.stringify(state.studentDB));
            localStorage.setItem('olahragaAdminConfig', JSON.stringify(state.adminConfig));
            localStorage.setItem('olahragaMedalResults', JSON.stringify(state.medalResults));
        }

        async function fetchFromGoogleSheet() {
            state.syncStatus = 'loading';
            renderApp();
            try {
                const response = await fetch(GOOGLE_SHEET_URL);
                const result = await response.json();
                if (result.status === 'success') {
                    state.participants = result.data || [];
                    
                    if (result.studentDatabase && Object.keys(result.studentDatabase).length > 0) {
                        state.studentDB = result.studentDatabase;
                    } else {
                        state.studentDB = {};
                    }
                    state.syncStatus = 'online';
                } else {
                    state.syncStatus = 'offline';
                }
            } catch (error) {
                state.syncStatus = 'offline';
            }
            saveData();
            renderApp();
        }

        function renderHeader() {
            let syncUI = '';
            if (state.syncStatus === 'online') {
                syncUI = `<div class="flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] md:text-xs font-black uppercase tracking-wider transition-all duration-300 bg-emerald-100 text-emerald-600 shadow-sm"><i data-lucide="cloud" class="w-3 h-3 md:w-4 md:h-4"></i><span>Awan Aktif</span></div>`;
            } else if (state.syncStatus === 'loading') {
                syncUI = `<div class="flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] md:text-xs font-black uppercase tracking-wider transition-all duration-300 bg-blue-100 text-blue-600 shadow-sm"><i data-lucide="refresh-cw" class="animate-spin w-3 h-3 md:w-4 md:h-4"></i><span>Memuat turun...</span></div>`;
            } else if (state.syncStatus === 'syncing') {
                syncUI = `<div class="flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] md:text-xs font-black uppercase tracking-wider transition-all duration-300 bg-blue-100 text-blue-600 shadow-sm"><i data-lucide="refresh-cw" class="animate-spin w-3 h-3 md:w-4 md:h-4"></i><span>Menyimpan...</span></div>`;
            } else {
                syncUI = `<div class="flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] md:text-xs font-black uppercase tracking-wider transition-all duration-300 bg-red-100 text-red-600 shadow-sm"><i data-lucide="cloud-off" class="w-3 h-3 md:w-4 md:h-4"></i><span>Luar Talian</span></div>`;
            }

            return `
                <div class="bg-white rounded-3xl md:rounded-[2rem] shadow-xl p-5 md:p-8 flex items-center justify-between border-4 border-blue-400 relative overflow-hidden animate-fade-in no-print">
                    <div class="absolute top-[-20px] right-[-20px] opacity-10">
                        <i data-lucide="trophy" style="width:200px; height:200px;"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="flex flex-wrap items-center gap-2 md:gap-3 mb-2">
                            <span class="bg-blue-400 text-white text-[10px] md:text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider">Kejohanan Olahraga Tahunan SK Simpang Empat 2026</span>
                            <i data-lucide="star" class="text-yellow-400 fill-yellow-400 animate-pulse w-4 h-4 md:w-5 md:h-5"></i>
                            ${syncUI}
                        </div>
                        <h1 class="text-2xl sm:text-3xl md:text-5xl font-black tracking-tight text-slate-800 drop-shadow-sm leading-tight">
                            Sistem Sukan <br class="block sm:hidden" /><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Sekolahku!</span> 🏃💨
                        </h1>
                        <p class="text-slate-500 font-bold mt-2 text-sm md:text-lg">Analisis Kontinjen & Papan Markah Pintar</p>
                    </div>
                </div>
            `;
        }

        function renderNav() {
            let navHtml = `
                <div class="flex space-x-2 md:space-x-3 overflow-x-auto p-2 bg-white/50 backdrop-blur-md shadow-sm rounded-[1.5rem] md:rounded-3xl hide-scrollbar pb-3 no-print animate-fade-in">
                    <button onclick="handleNav('Utama')" class="flex items-center space-x-2 px-4 py-2.5 md:px-6 md:py-3.5 rounded-xl md:rounded-2xl text-sm md:text-base font-black transition-all whitespace-nowrap ${state.activeTab === 'Utama' ? 'bg-indigo-600 text-white shadow-lg border-b-4 border-indigo-800 scale-105' : 'text-slate-500 bg-white hover:bg-indigo-50 border-b-4 border-slate-200'}">
                        <i data-lucide="trophy" class="w-4 h-4 md:w-5 md:h-5"></i><span>Papan Markah</span>
                    </button>
            `;

            Object.keys(houses).forEach(house => {
                const config = houses[house];
                const isLocked = state.adminConfig.housePasswords[house] && !state.unlockedHouses.includes(house) && state.activeTab !== 'Admin';
                navHtml += `
                    <button onclick="handleNav('${house}')" class="flex items-center space-x-2 px-4 py-2.5 md:px-6 md:py-3.5 rounded-xl md:rounded-2xl text-sm md:text-base font-black transition-all whitespace-nowrap ${state.activeTab === house ? `${config.tabActive} shadow-lg scale-105` : 'text-slate-500 bg-white hover:bg-slate-50 border-b-4 border-slate-200'}">
                        <i data-lucide="flag" class="w-4 h-4 md:w-5 md:h-5 ${state.activeTab === house ? 'text-white' : config.iconColor}"></i>
                        <span>${house}</span>
                        ${isLocked ? `<i data-lucide="lock" class="ml-1 opacity-50 w-3 h-3 md:w-3.5 md:h-3.5"></i>` : ''}
                    </button>
                `;
            });

            navHtml += `
                    <div class="flex-grow min-w-[10px]"></div>
                    <button onclick="handleNav('Admin')" class="flex items-center space-x-2 px-4 py-2.5 md:px-6 md:py-3.5 rounded-xl md:rounded-2xl text-sm md:text-base font-black transition-all whitespace-nowrap ${state.activeTab === 'Admin' ? 'bg-slate-800 text-white shadow-lg border-b-4 border-slate-900 scale-105' : 'text-slate-500 bg-white hover:bg-slate-200 border-b-4 border-slate-300'}">
                        <i data-lucide="lock" class="w-4 h-4 md:w-5 md:h-5"></i><span>Zon Cikgu</span>
                    </button>
                </div>
            `;
            return navHtml;
        }

        function calculatePoints() {
            let points = {};
            Object.keys(houses).forEach(h => {
                points[h] = 0;
            });
            Object.values(state.medalResults).forEach(eventResult => {
                if (eventResult['Emas'] && points[eventResult['Emas']] !== undefined) points[eventResult['Emas']] += 10;
                if (eventResult['Perak'] && points[eventResult['Perak']] !== undefined) points[eventResult['Perak']] += 7;
                if (eventResult['Gangsa'] && points[eventResult['Gangsa']] !== undefined) points[eventResult['Gangsa']] += 4;
            });
            return Object.keys(points).map(house => ({ name: house, score: points[house] })).sort((a, b) => b.score - a.score);
        }

        function getMedalTally() {
            let tally = {};
            Object.keys(houses).forEach(h => {
                tally[h] = { emas: 0, perak: 0, gangsa: 0, total: 0 };
            });
            Object.values(state.medalResults).forEach(res => {
                if (res.Emas && tally[res.Emas]) { tally[res.Emas].emas++; tally[res.Emas].total++; }
                if (res.Perak && tally[res.Perak]) { tally[res.Perak].perak++; tally[res.Perak].total++; }
                if (res.Gangsa && tally[res.Gangsa]) { tally[res.Gangsa].gangsa++; tally[res.Gangsa].total++; }
            });
            return tally;
        }

        function getPointsByEventType() {
            let pointsByType = {};
            Object.keys(houses).forEach(h => {
                pointsByType[h] = { "LOMPAT JAUH": 0, "LOMPAT TINGGI": 0, "LONTAR PELURU": 0, "100 METER": 0, total: 0 };
            });

            Object.entries(state.medalResults).forEach(([eventNo, res]) => {
                const event = officialEvents.find(e => e.no === eventNo);
                if (event) {
                    const type = event.nama.toUpperCase();
                    if (res.Emas && pointsByType[res.Emas] && pointsByType[res.Emas][type] !== undefined) { pointsByType[res.Emas][type] += 10; pointsByType[res.Emas].total += 10; }
                    if (res.Perak && pointsByType[res.Perak] && pointsByType[res.Perak][type] !== undefined) { pointsByType[res.Perak][type] += 7; pointsByType[res.Perak].total += 7; }
                    if (res.Gangsa && pointsByType[res.Gangsa] && pointsByType[res.Gangsa][type] !== undefined) { pointsByType[res.Gangsa][type] += 4; pointsByType[res.Gangsa].total += 4; }
                }
            });
            return pointsByType;
        }

        function renderDashboard() {
            const rankings = calculatePoints();
            const podiumOrder = [];
            
            // Susunan visual podium responsif (Ke-2 Kiri, Juara Tengah, Ke-3 Kanan, diikuti yang lain)
            if (rankings.length > 1) podiumOrder.push({ ...rankings[1], rank: 2 });
            if (rankings.length > 0) podiumOrder.push({ ...rankings[0], rank: 1 });
            if (rankings.length > 2) podiumOrder.push({ ...rankings[2], rank: 3 });
            for (let i = 3; i < rankings.length; i++) {
                podiumOrder.push({ ...rankings[i], rank: i + 1 });
            }

            const medalTally = getMedalTally();
            const eventTypePoints = getPointsByEventType();

            let html = `
                <div class="space-y-4 md:space-y-6 animate-slide-in-bottom">
                    <!-- Seksyen Podium Kedudukan Utama -->
                    <div class="bg-white p-4 md:p-8 rounded-3xl md:rounded-[2.5rem] shadow-xl border-4 border-slate-100 overflow-hidden relative">
                        <h2 class="text-xl md:text-2xl font-black text-center mb-6 md:mb-8 text-slate-800 uppercase tracking-widest flex items-center justify-center gap-2 md:gap-3">

                        </h2>
                        
                        <div class="flex flex-wrap justify-center items-end gap-2 sm:gap-3 md:gap-4 relative min-h-[250px] md:min-h-[300px] mt-10 pt-6">
            `;

            podiumOrder.forEach(r => {
                const h = r.name;
                const rank = r.rank;
                const config = houses[h];
                
                let rankHeight = 'h-16 md:h-24';
                if (rank === 1) rankHeight = 'h-40 md:h-56';
                else if (rank === 2) rankHeight = 'h-32 md:h-44';
                else if (rank === 3) rankHeight = 'h-24 md:h-36';
                else if (rank === 4) rankHeight = 'h-20 md:h-28';
                
                const medalSize = rank === 1 ? 'w-14 h-14 md:w-20 md:h-20' : rank === 2 ? 'w-10 h-10 md:w-14 md:h-14' : rank === 3 ? 'w-10 h-10 md:w-14 md:h-14' : 'w-8 h-8 md:w-10 md:h-10';
                
                let medalIconHtml = '';
                if (rank === 1) medalIconHtml = `<i data-lucide="trophy" class="text-yellow-400 fill-yellow-400 drop-shadow-lg ${medalSize}"></i>`;
                else if (rank === 2) medalIconHtml = `<i data-lucide="medal" class="text-slate-300 fill-slate-200 drop-shadow-md ${medalSize}"></i>`;
                else if (rank === 3) medalIconHtml = `<i data-lucide="medal" class="text-amber-600 fill-amber-500 drop-shadow-md ${medalSize}"></i>`;
                else medalIconHtml = `<i data-lucide="star" class="text-slate-200 fill-slate-100 drop-shadow-sm ${medalSize}"></i>`;

                html += `
                    <div class="flex flex-col items-center group flex-1 min-w-[100px] max-w-[140px] ${rank === 1 ? 'z-10' : 'z-0'}">
                        <div class="mb-2 md:mb-3 relative flex flex-col items-center justify-center">
                            ${rank === 1 ? `<div class="absolute -top-8 text-2xl md:text-3xl animate-bounce drop-shadow-md">👑</div>` : ''}
                            ${medalIconHtml}
                        </div>
                        <div class="w-full rounded-t-2xl md:rounded-t-3xl border-2 md:border-4 border-b-0 ${config.border} ${config.bgLight} ${rankHeight} flex flex-col justify-start pt-2 md:pt-4 items-center p-2 transition-all duration-700 ease-out transform group-hover:-translate-y-2 relative overflow-hidden shadow-inner">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent"></div>
                            <div class="absolute top-0 left-0 w-full h-2 md:h-3 bg-white/50"></div>
                            <span class="text-2xl sm:text-3xl md:text-5xl font-black ${config.text} relative z-10 drop-shadow-sm leading-none">${r.score}</span>
                            <span class="text-[8px] md:text-xs font-black ${config.text} opacity-80 mt-1 md:mt-2">MATA</span>
                            <div class="mt-auto pb-1 md:pb-2 w-full flex justify-center">
                                <span class="font-black text-[8px] sm:text-[9px] md:text-xs uppercase ${config.text} bg-white/90 border-2 ${config.border} px-1 md:px-2 py-1 rounded-lg md:rounded-xl relative z-10 text-center w-11/12 shadow-sm truncate" title="${h}">
                                    ${h}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>

                    <!-- KAWASAN ANALISIS PINAT & MATA (2-Column Grid) -->

            // Tapis hanya acara yang dimenangi pingat oleh rumah sukan ini
            const medalEvents = filteredEventsList.filter(event => {
                const currentResult = state.medalResults[event.no] || {};
                return currentResult.Emas === houseName || 
                       currentResult.Perak === houseName || 
                       currentResult.Gangsa === houseName;
            });
            
            if (medalEvents.length > 0) {
                medalEvents.forEach((event) => {
                    const currentResult = state.medalResults[event.no] || {};
                    
                    let medalBadge = '-';
                    if (currentResult.Emas === houseName) {
                        const pName = currentResult['EmasNama'] ? ` - ${currentResult['EmasNama']}` : '';
                        medalBadge = `<span class="bg-yellow-100 text-yellow-700 text-xs font-black px-2.5 py-1 rounded-md border border-yellow-300">🥇 EMAS${pName}</span>`;

                        const pName = currentResult['PerakNama'] ? ` - ${currentResult['PerakNama']}` : '';
                        medalBadge = `<span class="bg-slate-100 text-slate-700 text-xs font-black px-2.5 py-1 rounded-md border border-slate-300">🥈 PERAK${pName}</span>`;

                        const pName = currentResult['GangsaNama'] ? ` - ${currentResult['GangsaNama']}` : '';
                        medalBadge = `<span class="bg-orange-100 text-orange-700 text-xs font-black px-2.5 py-1 rounded-md border border-orange-300">🥉 GANGSA${pName}</span>`;

                    tbody += `
                        <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100">

                                        ${Object.keys(houses).map(h => `<option value="${h}" ${state.printHouse===h?'selected':''}>${h}</option>`).join('')}
                                    </select>
                                </div>
                                <button onclick="openPrintModal()" class="w-full py-3.5 md:py-4 mt-2 bg-indigo-600 hover:bg-indigo-500 border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1 text-white rounded-xl font-black text-base md:text-lg flex items-center justify-center gap-2 transition-all">
                                    <i data-lucide="printer" class="w-5 h-5"></i> Pratonton & Cetak Acara
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Penyelarasan Awan -->
                    <div class="bg-emerald-50 p-5 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-xl border-4 border-emerald-100">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                            <div class="flex items-center gap-3">
                                <div class="bg-emerald-100 p-2 md:p-3 rounded-xl md:rounded-2xl"><i data-lucide="cloud" class="text-emerald-600 w-5 h-5 md:w-6 md:h-6"></i></div>
                                <div>
                                    <h3 class="text-xl md:text-2xl font-black text-slate-800">Pangkalan Data Awan</h3>
                                    <p class="text-emerald-700 font-bold text-xs md:text-sm">Penyegerakan pendaftaran murid & jadual terus dari Google Sheets.</p>
                                </div>
                            </div>
                            <button onclick="fetchFromGoogleSheet()" ${state.syncStatus === 'loading' || state.syncStatus === 'syncing' ? 'disabled' : ''}
                                class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-black text-xs md:text-sm flex items-center justify-center gap-2 shadow-md transition-all active:translate-y-0.5 disabled:opacity-50">
                                <i data-lucide="refresh-cw" class="w-3.5 h-3.5 ${state.syncStatus === 'loading' || state.syncStatus === 'syncing' ? 'animate-spin' : ''}"></i>
                                Muat Semula Pangkalan Data
                            </button>
                        </div>
                        <div class="flex items-center bg-white p-3 md:p-4 rounded-xl border-2 border-emerald-200">
                            <input type="text" readonly value="${GOOGLE_SHEET_URL}" class="w-full bg-transparent font-bold text-slate-500 text-xs md:text-sm outline-none cursor-text" />
                        </div>
                    </div>

                    <!-- Keputusan Rasmi Acara (Penyuntingan Pingat Terbuka) -->
                    <div class="bg-white p-5 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-xl border-4 border-slate-200">
                        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 md:mb-8 gap-4">
                            <div class="flex items-center gap-3">
                                <div class="bg-yellow-100 p-2 md:p-3 rounded-xl md:rounded-2xl"><i data-lucide="trophy" class="text-yellow-600 w-6 h-6 md:w-7 md:h-7"></i></div>
                                <div>
                                    <h3 class="text-xl md:text-2xl font-black text-slate-800">Keputusan Rasmi Acara</h3>
                                    <p class="text-slate-500 font-bold text-xs md:text-sm">Kemaskini pemenang untuk mengira mata kejohanan secara automatik.</p>
                                </div>
                            </div>
                            
                            <div class="flex flex-col sm:flex-row gap-2">
                                <div class="relative">
                                    <input type="text" placeholder="Cari acara..." value="${state.searchKeyword}" oninput="setSearchKeyword(this.value)" class="w-full sm:w-64 px-4 py-2 border-2 border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-indigo-400 pl-10" />
                                    <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2"></i>
                                </div>
                                <div class="flex space-x-1 bg-slate-100 p-1.5 rounded-xl overflow-x-auto hide-scrollbar">
                                    ${catsBtnHtml}
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">${eventsHtml}</div>
                    </div>
                </div>
            `;
        }

        function renderModals() {
            let html = '';
            
            if (state.authModal.isOpen) {
                const isAd = state.authModal.targetHouse === 'Admin';
                const config = isAd ? null : houses[state.authModal.targetHouse];
                html += `
                    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in no-print">
                        <div class="bg-white rounded-[2rem] max-w-sm w-[90%] md:w-full p-6 md:p-8 shadow-2xl border-4 border-slate-200 animate-zoom-in mx-auto">
                            <div class="text-center mb-5 md:mb-6">
                                <div class="w-16 h-16 md:w-20 md:h-20 mx-auto rounded-full mb-3 md:mb-4 flex items-center justify-center ${isAd ? 'bg-slate-100' : config.bgLight}">
                                    <i data-lucide="lock" class="w-8 h-8 md:w-10 md:h-10 ${isAd ? 'text-slate-800' : config.text}"></i>
                                </div>
                                <h2 class="text-xl md:text-2xl font-black text-slate-800">${isAd ? 'Zon Cikgu' : `Rumah ${state.authModal.targetHouse}`}</h2>
                                <p class="text-slate-500 font-bold text-xs md:text-sm mt-1">${isAd ? 'Masukkan kata laluan pentadbir (admin123).' : 'Masukkan kata laluan untuk masuk.'}</p>
                            </div>
                            <form onsubmit="submitAuth(event)" class="space-y-4">
                                <input id="authInputPass" type="password" placeholder="Kata Laluan" autofocus class="w-full px-4 py-3 bg-slate-50 border-2 rounded-xl text-center font-bold text-lg outline-none transition-all ${state.authModal.error ? 'border-red-400 bg-red-50' : 'border-slate-200 focus:border-indigo-400'}" />
                                ${state.authModal.error ? `<p class="text-red-500 text-xs font-bold text-center">Ralat! Kata laluan tidak sah.</p>` : ''}
                                <div class="flex gap-2">
                                    <button type="button" onclick="closeAuthModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition-all border-b-4 border-slate-200 active:border-b-0 active:translate-y-1">Batal</button>
                                    <button type="submit" class="flex-1 py-3 text-white font-bold rounded-xl shadow-md transition-all ${isAd ? 'bg-slate-800 hover:bg-slate-700 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1' : config.button}">Buka</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            // Pratonton Cetakan A4 Landscape
            if (state.showPrintModal) {
                const pHouse = state.printHouse;
                const pConfig = houses[pHouse];

                document.getElementById('print-container').innerHTML = `
                    <div class="mb-6 text-center border-b-4 border-slate-800 pb-4">
                        <h1 class="text-3xl font-black uppercase tracking-wider text-slate-900">Kejohanan Olahraga SK Simpang Empat 2026</h1>
                        <h2 class="text-2xl font-black mt-2 ${pConfig.text}">Rumah ${pHouse} - Rekod 38 Senarai Acara</h2>
                    </div>
                    ${renderAnalysisTableHTML(pConfig, pHouse, getEventsForHouse(pHouse))}
                `;

                html += `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex flex-col items-center justify-center p-2 sm:p-4 z-[60] animate-fade-in no-print">
                        <div class="bg-white rounded-[1.5rem] md:rounded-[2rem] w-full max-w-6xl flex flex-col shadow-2xl overflow-hidden animate-zoom-in h-[95vh]">
                            <div class="bg-slate-100 p-3 md:p-5 flex justify-between items-center border-b-4 border-slate-200 shrink-0">
                                <div class="flex items-center gap-2 md:gap-3">
                                    <div class="bg-indigo-100 p-2 md:p-3 rounded-xl md:rounded-2xl text-indigo-600 shadow-sm"><i data-lucide="printer" class="w-6 h-6 md:w-7 md:h-7"></i></div>
                                    <div>
                                        <h3 class="text-lg md:text-2xl font-black text-slate-800">Pratonton Cetakan</h3>
                                        <p class="text-slate-500 font-bold text-xs md:text-sm">Saiz: A4 Melintang</p>
                                    </div>
                                </div>
                                <button onclick="state.showPrintModal = false; renderApp();" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-slate-200 hover:bg-red-100 hover:text-red-500 rounded-full transition-all font-black text-lg md:text-xl shadow-sm border-2 border-slate-300">✕</button>
                            </div>
                            <div class="p-2 md:p-8 overflow-y-auto overflow-x-auto bg-slate-200 flex-1 flex justify-start lg:justify-center items-start shadow-inner">
                                <div class="bg-white p-6 md:p-12 shadow-xl border border-slate-300 w-max min-w-[297mm] min-h-[210mm] shrink-0 origin-top-left lg:origin-top scale-[0.4] sm:scale-[0.6] md:scale-75 lg:scale-100 transform transition-transform">
                                    <div class="mb-6 text-center border-b-[3px] border-slate-800 pb-4">
                                        <h1 class="text-3xl font-black uppercase tracking-wider text-slate-900">Kejohanan Olahraga SK Simpang Empat 2026</h1>
                                        <h2 class="text-2xl font-black mt-2 ${pConfig.text}">Rumah ${pHouse} - Rekod 38 Senarai Acara</h2>
                                    </div>
                                    ${renderAnalysisTableHTML(pConfig, pHouse, getEventsForHouse(pHouse))}
                                </div>
                            </div>
                            <div class="p-3 md:p-5 bg-white border-t-4 border-slate-100 flex justify-end gap-2 md:gap-3 shrink-0">
                                <button onclick="state.showPrintModal = false; renderApp();" class="px-4 md:px-6 py-2.5 md:py-3.5 font-bold text-sm md:text-base text-slate-600 bg-slate-100 border-b-4 border-slate-200 hover:bg-slate-200 rounded-xl md:rounded-2xl">Batal</button>
                                <button onclick="executePrint()" class="px-4 md:px-6 py-2.5 md:py-3.5 font-bold text-sm md:text-base text-white bg-indigo-600 border-b-4 border-indigo-800 hover:bg-indigo-500 rounded-xl md:rounded-2xl flex items-center gap-2">
                                    <i data-lucide="printer" class="w-5 h-5"></i> Teruskan Cetak
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('modals').innerHTML = html;
        }

        window.handleNav = (target) => {
            if (target === 'Admin') {
                if (!state.isZonCikguUnlocked) {
                    state.authModal = { isOpen: true, targetHouse: 'Admin', error: false };
                } else { state.activeTab = 'Admin'; }
            } else if (houses[target]) {
                const requiredPass = state.adminConfig.housePasswords[target];
                if (requiredPass && !state.unlockedHouses.includes(target) && state.activeTab !== 'Admin') {
                    state.authModal = { isOpen: true, targetHouse: target, error: false };
                } else { state.activeTab = target; }
            } else { state.activeTab = target; }
            
            state.searchKeyword = ''; // set semula carian
            state.houseFilterAcara = 'Semua'; // set semula penapis
            renderApp();
        };

        window.submitAuth = (e) => {
            e.preventDefault();
            const input = document.getElementById('authInputPass').value;
            if (state.authModal.targetHouse === 'Admin') {
                if (input === 'admin123') {
                    state.isZonCikguUnlocked = true;
                    state.activeTab = 'Admin';
                    state.authModal.isOpen = false;
                } else { state.authModal.error = true; }
            } else {
                if (input === state.adminConfig.housePasswords[state.authModal.targetHouse]) {
                    state.unlockedHouses.push(state.authModal.targetHouse);
                    state.activeTab = state.authModal.targetHouse;
                    state.authModal.isOpen = false;
                } else { state.authModal.error = true; }
            }
            renderApp();
        };
        
        window.closeAuthModal = () => { state.authModal.isOpen = false; renderApp(); };

        window.toggleLock = () => { state.adminConfig.isRegistrationLocked = !state.adminConfig.isRegistrationLocked; saveData(); renderApp(); };
        window.updateHousePass = (house, val) => { state.adminConfig.housePasswords[house] = val; saveData(); };
        
        window.setAdminFilterAcara = (cat) => { state.adminFilterAcara = cat; renderApp(); };
        window.setHouseFilterAcara = (cat) => { state.houseFilterAcara = cat; renderApp(); };
        window.setSearchKeyword = (val) => { state.searchKeyword = val; renderApp(); };

        window.handleMedalChange = (eventNo, medalType, house) => {
            if (!state.medalResults[eventNo]) state.medalResults[eventNo] = {};
            state.medalResults[eventNo][medalType] = house;
            saveData(); 
            renderApp();
        };

        window.handleMedalNameChange = (eventNo, medalType, name) => {
            if (!state.medalResults[eventNo]) state.medalResults[eventNo] = {};
            state.medalResults[eventNo][medalType + 'Nama'] = name;
            saveData();
        };

        window.openPrintModal = () => { state.showPrintModal = true; renderApp(); };
        window.executePrint = () => {
            window.print();
            setTimeout(() => { state.showPrintModal = false; renderApp(); }, 500);
        };

        function renderApp() {
            let contentHtml = '';
            if (state.activeTab === 'Utama') contentHtml = renderDashboard();
            else if (state.activeTab === 'Admin') contentHtml = renderAdminPanel();
            else contentHtml = renderHouse(state.activeTab);

            const appHtml = `
                ${renderHeader()}
                ${renderNav()}
                <div class="transition-all duration-300 relative z-10 no-print">${contentHtml}</div>
            `;
            
            document.getElementById('app').innerHTML = appHtml;
            renderModals();
            
            // Render semula ikon Lucide
            lucide.createIcons();
        }

        // Jalankan sistem apabila tetingkap dimuat sepenuhnya
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            fetchFromGoogleSheet();
        });

    </script>
</body>
</html>
